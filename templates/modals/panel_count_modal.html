<div
  id="panel-count-modal"
  class="modal-overlay"
  style="display: none; z-index: 10000"
>
  <div class="modal-container" style="max-width: 500px">
    <div class="modal-header">
      <h3><i class="fas fa-edit"></i> Edit Panel Count</h3>
      <button class="btn-close" onclick="closePanelCountEditor()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="modal-body">
      <div class="alert alert-info" style="margin-bottom: 20px">
        <i class="fas fa-info-circle"></i>
        <span
          >Manually adjust panel count to fine-tune system size and savings
          percentage.</span
        >
      </div>

      <div class="form-group">
        <label style="font-weight: bold; font-size: 1.1rem"
          >Number of Panels</label
        >
        <input
          type="number"
          id="manual-panel-count"
          min="1"
          step="1"
          style="
            font-size: 1.2rem;
            padding: 12px;
            text-align: center;
            font-weight: bold;
          "
        />
      </div>

      <div
        style="
          background: #f8fafc;
          padding: 15px;
          border-radius: 8px;
          margin-top: 15px;
        "
      >
        <h5 style="margin-bottom: 10px; color: #334155">Live Preview:</h5>
        <div
          style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px"
        >
          <div style="text-align: center">
            <small style="color: #64748b">System Size</small><br />
            <strong
              id="preview-system-size"
              style="font-size: 1.3rem; color: #0f172a"
              >0 kWp</strong
            >
          </div>
          <div style="text-align: center">
            <small style="color: #64748b">Achieved Savings</small><br />
            <strong
              id="preview-savings-percent"
              style="font-size: 1.3rem; color: #0f172a"
              >0%</strong
            >
          </div>
          <div style="text-align: center">
            <small style="color: #64748b">Annual Energy</small><br />
            <strong
              id="preview-annual-energy"
              style="font-size: 1.1rem; color: #0f172a"
              >0 kWh</strong
            >
          </div>
          <div style="text-align: center">
            <small style="color: #64748b">Target Energy</small><br />
            <strong
              id="preview-target-energy"
              style="font-size: 1.1rem; color: #64748b"
              >0 kWh</strong
            >
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePanelCountEditor()">
        <i class="fas fa-times"></i> Cancel
      </button>
      <button class="btn btn-primary" onclick="applyManualPanelCount()">
        <i class="fas fa-check"></i> Apply Changes
      </button>
    </div>
  </div>
</div>
