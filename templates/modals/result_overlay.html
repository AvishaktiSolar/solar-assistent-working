<section id="solar-panel-page" class="page-section overlay-view">

    <div class="card result-card">
      <div class="card-header">
        <h2><i class="fas fa-check-circle"></i> Stage 1 Analysis Report</h2>
        <button class="btn-close" onclick="goBackToInput()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="card-body scrollable-y">
        <div id="solar-output"></div>
      </div>
      <div class="card-footer">
        <button class="btn btn-secondary" onclick="goBackToInput()">
          Edit Inputs
        </button>
        <button

          onclick="switchStage(2); goBackToInput();"
        >
          Proceed to Stage 2 <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>
</section>
