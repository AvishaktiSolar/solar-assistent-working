<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Avishakti Solar</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='index.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='login.css') }}"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1><i class="fas fa-solar-panel"></i> Avishakti</h1>
          <p id="loginSubtext">Solar Design Assistant</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div
          class="error-message"
          style="
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success-color);
            color: var(--success-color);
          "
        >
          <i class="fas fa-check-circle"></i> {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        {% if error %}
        <div class="error-message">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter username"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Login <i class="fas fa-sign-in-alt"></i>
          </button>
        </form>

        <div style="margin-top: 2rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem; text-align: center;">
            <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 10px;">Access Material Inventory?</p>
            <button type="button" class="btn btn-sm btn-secondary" onclick="toggleProcurementMode()" style="width: 100%; border: 1px dashed #3b82f6; color: #3b82f6;">
                <i class="fas fa-boxes"></i> Procurement Portal Login
            </button>
        </div>

      </div>
    </div>

    <script>
        function toggleProcurementMode() {
            // 1. Pre-fill the username
            const userField = document.getElementById('username');
            userField.value = "procure";
            
            // 2. Focus on password field
            document.getElementById('password').focus();
            
            // 3. Visual Feedback
            const subtext = document.getElementById('loginSubtext');
            subtext.innerHTML = "<i class='fas fa-warehouse'></i> Procurement Access Mode";
            subtext.style.color = "#f59e0b"; // Orange/Yellow color
            subtext.style.fontWeight = "bold";
        }
    </script>
  </body>
</html>
