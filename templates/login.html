<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='index.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='login.css') }}"
    />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div class="logo-wrap" aria-hidden="true">
            <picture>
              <source
                srcset="{{ url_for('static', filename='avishakti.avif') }}"
                type="image/avif"
              />
              <img
                class="login-logo"
                src="{{ url_for('static', filename='avishakti.jpg') }}"
                alt="Avishakti rooftop solar solutions"
              />
            </picture>
          </div>
<p id="loginSubtext">Solar Design Assistant</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %} {% if
        messages %} {% for category, message in messages %}
        <div
          class="error-message"
          style="
            background: rgba(34, 197, 94, 0.1);
            border-color: var(--success-color);
            color: var(--success-color);
          "
        >
          <i class="fas fa-check-circle"></i> {{ message }}
        </div>
        {% endfor %} {% endif %} {% endwith %}

        {% if error %}
        <div class="error-message">
          <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="form-group">
            <label for="username">Username</label>
            <div class="input-icon">
              <i class="fas fa-user"></i>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter username"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon">
              <i class="fas fa-lock"></i>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            Login <i class="fas fa-sign-in-alt"></i>
          </button>
        </form>

        <div class="procurement-divider">
            <p>Access Material Inventory?</p>
            <button type="button" class="btn btn-sm btn-secondary" onclick="toggleProcurementMode()">
                <i class="fas fa-boxes"></i> Procurement Portal Login
            </button>
        </div>

      </div>
    </div>

    <script>
        function toggleProcurementMode() {
            // 1. Pre-fill the username
            const userField = document.getElementById('username');
            userField.value = "procure";
            
            // 2. Focus on password field
            document.getElementById('password').focus();
            
            // 3. Visual Feedback
            const subtext = document.getElementById('loginSubtext');
            subtext.innerHTML = "<i class='fas fa-warehouse'></i> Procurement Access Mode";
            subtext.style.color = "#d9b020"; // Brand yellow
            subtext.style.fontWeight = "bold";
        }
    </script>
  </body>
</html>
